<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #f4f6f9; 
            font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; 
        }
        .container { 
            text-align: center; 
            background: #fff;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { 
            font-size: 36px; 
            color: #222; 
            margin-bottom: 20px; 
            font-weight: 800;
        }
        p { 
            font-size: 16px; 
            color: #666; 
            margin-bottom: 30px;
        }
        .loader { 
            margin: 0 auto; 
            border: 4px solid #eee; 
            border-top: 4px solid #0056b3; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Under Construction...</h1>
        <p>페이지를 준비 중입니다.<br>3초 후 이전 화면으로 돌아갑니다.</p>
        <div class="loader"></div>
    </div>
    <script>
        setTimeout(() => {
            window.history.back();
        }, 3000);
    </script>
</body>
</html>
